<!doctype html>
<html lang="es" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>Turdo CRM</title>
    <meta name="description" content="CRM de Turdo Group — gestión de leads, ventas y comisiones." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#8B1F1F" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#8B1F1F" media="(prefers-color-scheme: dark)" />
    <meta name="application-name" content="Turdo CRM" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Turdo" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Color de fondo en TODA la viewport (incluso al hacer overscroll) -->
    <style>
      html, body { background-color: #F8F9FB; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
